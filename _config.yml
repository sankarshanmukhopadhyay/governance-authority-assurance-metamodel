title: Governance, Authority and Assurance Metamodel
description: Protocol-neutral governance semantics for authority, delegation, evidence, assurance and accountable digital trust.
theme: minima
markdown: kramdown
plugins:
  - jekyll-seo-tag
header_pages:
  - specification/governance-authority-assurance-metamodel.md
  - docs/architecture-overview.md
  - docs/implementation-guide.md
  - docs/conformance-guide.md
  - docs/lifecycle-model.md
  - docs/glossary.md
  - releases/v0.5.0.md
exclude:
  - requirements-dev.txt
  - scripts
  - tests
  - validation
  - packages
  - schemas
  - vocabularies
  - Gemfile.lock
