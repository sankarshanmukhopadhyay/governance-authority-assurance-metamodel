title: Governance, Authority and Assurance Metamodel
description: Protocol-neutral governance semantics for authority, delegation, evidence, assurance and accountable digital trust.
url: https://sankarshanmukhopadhyay.github.io
baseurl: /governance-authority-assurance-metamodel
repository: sankarshanmukhopadhyay/governance-authority-assurance-metamodel
version: 0.9.0
status: Candidate Specification
theme: minima
markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true
  toc_levels: 2..4
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
header_pages:
  - specification/index.md
  - profiles/index.md
  - schemas/index.md
  - vocabularies/index.md
  - docs/index.md
  - conformance/index.md
  - releases/index.md
exclude:
  - requirements-dev.txt
  - scripts
  - tests
  - validation
  - packages
  - Gemfile.lock
  - vendor
  - .bundle
defaults:
  - scope:
      path: ""
    values:
      layout: page
      version: "0.9.0"
      release_status: "Candidate Specification"
