title: Governance, Authority and Assurance Metamodel
description: Protocol-neutral governance semantics for authority, delegation, evidence, assurance and accountable digital trust.
url: https://sankarshanmukhopadhyay.github.io
baseurl: /governance-authority-assurance-metamodel
repository: sankarshanmukhopadhyay/governance-authority-assurance-metamodel
version: 0.9.0
status: Candidate Specification
theme: just-the-docs
color_scheme: light
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"
# Mermaid diagram rendering for ```mermaid fenced code blocks (docs/diagrams).
# Disabled by default when consuming the theme as a gem; version pinned to
# match the publication-grade version-pinning requirement for this repo.
mermaid:
  version: "11.16.0"
markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true
  toc_levels: 2..4
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
aux_links:
  "GAAM on GitHub":
    - "https://github.com/sankarshanmukhopadhyay/governance-authority-assurance-metamodel"
aux_links_new_tab: true
callouts:
  candidate:
    title: Candidate Specification
    color: purple
  normative:
    title: Normative
    color: blue
  informative:
    title: Informative
    color: grey-dk
exclude:
  - README.md
  - requirements-dev.txt
  - package.json
  - package-lock.json
  - node_modules
  - scripts
  - tests
  - validation
  - packages
  - artifacts
  - Gemfile.lock
  - vendor
  - .bundle
  - Dockerfile
  - docker-compose.yml
defaults:
  - scope:
      path: ""
    values:
      layout: default
      version: "0.9.0"
      release_status: "Candidate Specification"
