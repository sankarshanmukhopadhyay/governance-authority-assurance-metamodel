name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate guided learning paths
        run: python scripts/validate_learning_paths.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install diagram validation dependencies
        run: npm ci

      - name: Validate Mermaid diagrams
        run: npm run validate:mermaid

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - uses: actions/configure-pages@v5
        id: pages

      - name: Build
        env:
          JEKYLL_ENV: production
        run: >
          bundle exec jekyll build
          --baseurl "${{ steps.pages.outputs.base_path }}"
          --strict_front_matter
          --trace

      - name: Publish versioned schema mirror
        run: python3 scripts/publish_versioned_schemas.py

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
